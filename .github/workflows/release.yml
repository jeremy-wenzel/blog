name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release archive
        run: |
          cd dist
          zip -r ../blog-dist.zip .
          cd ..

      - name: Generate SHA-256 hash
        run: |
          sha256sum blog-dist.zip > blog-dist.zip.sha256
          cat blog-dist.zip.sha256

      - name: Generate release tag
        id: tag
        run: echo "tag=build-$(date -u +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build ${{ steps.tag.outputs.tag }}"
          body: |
            Automated build release.

            **SHA-256 checksum:**
            ```
            $(cat blog-dist.zip.sha256)
            ```
          files: |
            blog-dist.zip
            blog-dist.zip.sha256
